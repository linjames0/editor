<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f9f9f8;
  --surface: #ffffff;
  --border: #e8e8e6;
  --text: #1a1a1a;
  --text-2: #555552;
  --text-3: #aaa;
  --accent: #6c63ff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-size: 15.5px;
  line-height: 1.74;
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
  min-height: 100vh;
}

/* ── top bar ── */
#topbar {
  position: sticky; top: 0; z-index: 10;
  background: rgba(249,249,248,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 48px;
  display: flex; align-items: center; justify-content: space-between;
}
#topbar-brand { font-size: 13px; color: var(--text-2); font-weight: 500; letter-spacing: 0.02em; }
#topbar-doc  { font-size: 13px; color: var(--text-3); }

/* ── doc area ── */
#doc-wrap {
  max-width: 760px;
  margin: 0 auto;
  padding: 64px 40px 160px;
}

#preview-title {
  font-size: 30px;
  font-weight: 760;
  line-height: 1.2;
  color: var(--text);
  margin-bottom: 12px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

#preview-content {
  margin-top: 28px;
  font-size: 15.5px;
  line-height: 1.74;
}

/* Mirror the editor heading styles */
#preview-content h1, #preview-content h1 * { font-size: 30px !important; font-weight: 760 !important; line-height: 1.2; }
#preview-content h2, #preview-content h2 * { font-size: 22px !important; font-weight: 680 !important; line-height: 1.28; }
#preview-content h3, #preview-content h3 * { font-size: 17px !important; font-weight: 640 !important; line-height: 1.38; }
#preview-content h1, #preview-content h2, #preview-content h3 { display: block; margin-top: 1.1em; margin-bottom: 0.3em; color: var(--text); }
#preview-content p { margin: 0; }
#preview-content p+p { margin-top: 0.1em; }
#preview-content ul, #preview-content ol { padding-left: 2em; margin: 0.3em 0; }
#preview-content li { margin: 0.1em 0; }
#preview-content blockquote { border-left: 3px solid var(--border); margin: 0.6em 0; padding: 2px 16px; color: var(--text-2); }
#preview-content a { color: var(--accent); text-decoration: underline; }
#preview-content [style*="text-align: center"],
#preview-content [style*="text-align:center"] { padding-left: 150px; padding-right: 150px; box-sizing: border-box; }

/* Suppress comment marks */
#preview-content .c-mark { background: none !important; border-bottom: none !important; }

/* loading / error states */
#state {
  text-align: center;
  padding: 120px 40px;
  color: var(--text-2);
  font-size: 15px;
}
#state.error { color: #d44; }
#spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* meta footer */
#preview-meta {
  margin-top: 56px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-3);
}
</style>
</head>
<body>

<div id="topbar">
  <span id="topbar-brand">Docs</span>
  <span id="topbar-doc"></span>
</div>

<div id="state">
  <div id="spinner"></div>
  Loading document…
</div>

<div id="doc-wrap" style="display:none">
  <div id="preview-title"></div>
  <div id="preview-content"></div>
  <div id="preview-meta"></div>
</div>

<script>
(async () => {
  const params = new URLSearchParams(location.search);
  // Support both ?id=xxx and /preview/:id via path
  const id = params.get('id') || location.pathname.split('/').pop();

  const state   = document.getElementById('state');
  const wrap    = document.getElementById('doc-wrap');

  function showError(msg) {
    state.className = 'error';
    state.innerHTML = `<div style="font-size:24px;margin-bottom:8px">⚠</div>${msg}`;
  }

  if (!id || id === 'preview.html') {
    showError('No document ID provided.');
    return;
  }

  let doc;
  try {
    const res = await fetch(`/api/doc/${id}`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      showError(err.error || 'Failed to load document.');
      return;
    }
    doc = await res.json();
  } catch (e) {
    showError('Network error. Please try again.');
    return;
  }

  // Populate
  document.title = (doc.title || 'Untitled') + ' — Docs';
  document.getElementById('preview-title').textContent = doc.title || 'Untitled';
  document.getElementById('topbar-doc').textContent = doc.docTitle || '';

  const content = document.getElementById('preview-content');
  content.innerHTML = doc.content || '';

  // Remove any contenteditable attributes + sel-marks
  content.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
  content.querySelectorAll('.sel-mark').forEach(el => {
    const p = el.parentNode;
    while (el.firstChild) p.insertBefore(el.firstChild, el);
    p.removeChild(el);
  });

  // Meta
  if (doc.createdAt) {
    const d = new Date(doc.createdAt);
    document.getElementById('preview-meta').textContent =
      'Shared ' + d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  state.style.display = 'none';
  wrap.style.display = '';
})();
</script>
</body>
</html>
